<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stone Paper Scissor</title>
    <link rel="stylesheet" href="10th.css" />
  </head>
  <body>
    <h1>Stone Paper Scissor</h1>

    <div class="choices">
      <div class="item">
        <div class="choice" id="rock">
          <img src="./image/rock.png" />
        </div>
        <p class="txt">STONE</p>
      </div>

      <div class="item">
        <div class="choice" id="paper">
          <img src="./image/paper.png" />
        </div>
        <p class="txt">PAPER</p>
      </div>

      <div class="item">
        <div class="choice" id="scissor">
          <img src="./image/scissors.png" />
        </div>
        <p class="txt">SCISSOR</p>
      </div>
    </div>

    <div class="score-board">
      <div class="score">
        <p id="you">0</p>
        <p>You</p>
      </div>
      <div class="score">
        <p id="comp">0</p>
        <p>Comp</p>
      </div>
    </div>

    <div class="msgContainer">
      <div class="msg">Your Move</div>
    </div>

    <script src="10th.js"></script>
  </body>
</html>
