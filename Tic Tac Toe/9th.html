<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="9th.css" />
  </head>
  <body>
    <main>
      <h1 style="font-size: 40px">Tic Tac Toe</h1>
      <button id="themebtn">MODE</button>
      <div></div>
      <div id="p1"><b>Player 1 - X</b></div>
      <div id="p2"><b>Player 2 - O</b></div>
      <div id="pointer"><b>Pointer - Player 1</b></div>
      <div class="container">
        <div class="game">
          <button id="box0" class="boxs"></button>
          <button id="box1" class="boxs"></button>
          <button id="box2" class="boxs"></button>
          <button id="box3" class="boxs"></button>
          <button id="box4" class="boxs"></button>
          <button id="box5" class="boxs"></button>
          <button id="box6" class="boxs"></button>
          <button id="box7" class="boxs"></button>
          <button id="box8" class="boxs"></button>
        </div>
      </div>
      <button id="reset-btn">Reset Game</button>
      <div class="msgContainer hide">
        <p id="msg">Winner</p>
        <button id="new-game">New Game</button>
      </div>
    </main>
    <script src="9th.js"></script>
  </body>
</html>
